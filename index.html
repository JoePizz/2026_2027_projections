<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Predictions 2026-27</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-start;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 0.9em;
            color: #333;
        }

        .filter-group input,
        .filter-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            min-width: 150px;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .multi-select {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px;
            min-width: 150px;
            background: white;
        }

        .multi-select label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
            font-size: 0.9em;
            gap: 8px;
        }

        .multi-select input[type="checkbox"] {
            margin: 0;
            cursor: pointer;
        }

        .confidence-band {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .confidence-band label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            cursor: pointer;
            margin: 0;
        }

        .confidence-band input[type="radio"] {
            margin: 0;
            cursor: pointer;
        }

        .league-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            color: white;
        }

        .league-ohl { background-color: #2c3e50; }
        .league-ojhl { background-color: #e74c3c; }
        .league-gojhl { background-color: #f39c12; }
        .league-nojhl { background-color: #16a085; }
        .league-u16 { background-color: #8e44ad; }
        .league-other { background-color: #95a5a6; }

        .position-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            background: #ecf0f1;
            color: #2c3e50;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th {
            background: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        th.sortable:hover {
            background: #2c3e50;
        }

        th::after {
            content: ' ⇅';
            opacity: 0;
            font-size: 0.8em;
        }

        th.sorted-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sorted-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .player-name {
            font-weight: 600;
            color: #2c3e50;
            min-width: 150px;
        }

        .stats-info {
            text-align: center;
            color: #555;
        }

        .prediction-cell {
            text-align: center;
            font-weight: 500;
        }

        .prediction-high {
            color: #27ae60;
        }

        .prediction-mid {
            color: #f39c12;
        }

        .prediction-low {
            color: #e74c3c;
        }

        .results-info {
            padding: 15px 20px;
            background: #e8f4f8;
            border-top: 1px solid #bdc3c7;
            color: #2c3e50;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #bdc3c7;
            background: #f8f9fa;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            color: #7f8c8d;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .tab-button.active {
            color: #3498db;
            border-bottom: 3px solid #3498db;
            margin-bottom: -2px;
        }

        .tab-button:hover {
            color: #34495e;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏒 Hockey Predictions 2026-27</h1>
            <p>Junior Hockey Player Performance Forecasts</p>
        </div>

        <div id="app"></div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            // Filters
            const [searchPlayer, setSearchPlayer] = useState('');
            const [selectedLeagues, setSelectedLeagues] = useState(new Set(['OHL']));
            const [selectedPositions, setSelectedPositions] = useState(new Set());
            const [selectedAgeGroups, setSelectedAgeGroups] = useState(new Set());
            const [ppgRange, setPpgRange] = useState({ min: 0, max: 5 });
            const [confidenceBand, setConfidenceBand] = useState('medium');
            
            // Sorting
            const [sortColumn, setSortColumn] = useState('PTS_OHL_2026_27');
            const [sortOrder, setSortOrder] = useState('desc');
            
            // League tab
            const [activeTab, setActiveTab] = useState('OHL');

            // Load data
            useEffect(() => {
                fetch('predictions_data.json')
                    .then(res => res.json())
                    .then(json => {
                        setData(json);
                        setLoading(false);
                    })
                    .catch(err => {
                        setError(`Failed to load data: ${err.message}`);
                        setLoading(false);
                    });
            }, []);

            // Filter data
            const filteredData = data.filter(row => {
                // Player search
                if (searchPlayer && !row.Player.toLowerCase().includes(searchPlayer.toLowerCase())) {
                    return false;
                }

                // League (multi-select)
                if (selectedLeagues.size > 0 && !selectedLeagues.has(row.League_2025_26)) {
                    return false;
                }

                // Position (multi-select)
                if (selectedPositions.size > 0 && !selectedPositions.has(row.Position_Class)) {
                    return false;
                }

                // Age Group (multi-select)
                if (selectedAgeGroups.size > 0 && !selectedAgeGroups.has(row.Age_Group_2025_26)) {
                    return false;
                }

                // PPG range
                if (row.PPG_2025_26 < ppgRange.min || row.PPG_2025_26 > ppgRange.max) {
                    return false;
                }

                return true;
            });

            // Sort data
            const sortedData = [...filteredData].sort((a, b) => {
                const aVal = a[sortColumn] ?? 0;
                const bVal = b[sortColumn] ?? 0;
                
                if (typeof aVal === 'string') {
                    return sortOrder === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                }
                
                return sortOrder === 'asc' ? aVal - bVal : bVal - aVal;
            });

            // Get prediction values based on confidence band
            const getPredictionValue = (player, metric) => {
                const predictions = player[`${activeTab}_predictions`];
                if (!predictions) return 0;
                return predictions[confidenceBand][metric] ?? 0;
            };

            // Handle multi-select filter changes
            const handleLeagueChange = (league) => {
                const newSet = new Set(selectedLeagues);
                if (newSet.has(league)) {
                    newSet.delete(league);
                } else {
                    newSet.add(league);
                }
                setSelectedLeagues(newSet);
            };

            const handlePositionChange = (pos) => {
                const newSet = new Set(selectedPositions);
                if (newSet.has(pos)) {
                    newSet.delete(pos);
                } else {
                    newSet.add(pos);
                }
                setSelectedPositions(newSet);
            };

            const handleAgeChange = (age) => {
                const newSet = new Set(selectedAgeGroups);
                if (newSet.has(age)) {
                    newSet.delete(age);
                } else {
                    newSet.add(age);
                }
                setSelectedAgeGroups(newSet);
            };

            const handleSort = (column) => {
                if (sortColumn === column) {
                    setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc');
                } else {
                    setSortColumn(column);
                    setSortOrder('desc');
                }
            };

            const getLeagueBadgeClass = (league) => {
                if (league.includes('OHL') && !league.includes('OJHL') && !league.includes('GOJHL') && !league.includes('NOJHL')) return 'league-ohl';
                if (league.includes('OJHL')) return 'league-ojhl';
                if (league.includes('GOJHL')) return 'league-gojhl';
                if (league.includes('NOJHL')) return 'league-nojhl';
                if (league.includes('U16') || league.includes('u16')) return 'league-u16';
                return 'league-other';
            };

            const getPredictionClass = (value) => {
                if (value >= 1.0) return 'prediction-high';
                if (value >= 0.5) return 'prediction-mid';
                return 'prediction-low';
            };

            if (loading) return <div className="no-data">Loading predictions...</div>;
            if (error) return <div className="no-data" style={{color: '#e74c3c'}}>{error}</div>;

            return (
                <>
                    <div className="controls">
                        <div className="filter-group">
                            <label>Player Name</label>
                            <input 
                                type="text" 
                                placeholder="Search player..." 
                                value={searchPlayer}
                                onChange={(e) => setSearchPlayer(e.target.value)}
                            />
                        </div>

                        <div className="filter-group">
                            <label>League (Multi-select)</label>
                            <div className="multi-select">
                                {['OHL', 'OJHL', 'GOJHL', 'NOJHL', 'GTHL-U16', 'OMHA-U16', 'HEO-U16', 'ALLIANCE-U16'].map(league => (
                                    <label key={league}>
                                        <input 
                                            type="checkbox" 
                                            checked={selectedLeagues.has(league)}
                                            onChange={() => handleLeagueChange(league)}
                                        />
                                        {league}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="filter-group">
                            <label>Position (Multi-select)</label>
                            <div className="multi-select">
                                {['C', 'W', 'D', 'F_Other'].map(pos => (
                                    <label key={pos}>
                                        <input 
                                            type="checkbox" 
                                            checked={selectedPositions.has(pos)}
                                            onChange={() => handlePositionChange(pos)}
                                        />
                                        {pos}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="filter-group">
                            <label>Age Group (Multi-select)</label>
                            <div className="multi-select">
                                {['u16', 'u17', 'u18', 'u19', 'u20'].map(age => (
                                    <label key={age}>
                                        <input 
                                            type="checkbox" 
                                            checked={selectedAgeGroups.has(age)}
                                            onChange={() => handleAgeChange(age)}
                                        />
                                        {age.toUpperCase()}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="filter-group">
                            <label>PPG Min</label>
                            <input 
                                type="number" 
                                min="0" 
                                max="5" 
                                step="0.1"
                                value={ppgRange.min}
                                onChange={(e) => setPpgRange({...ppgRange, min: parseFloat(e.target.value)})}
                            />
                        </div>

                        <div className="filter-group">
                            <label>PPG Max</label>
                            <input 
                                type="number" 
                                min="0" 
                                max="5" 
                                step="0.1"
                                value={ppgRange.max}
                                onChange={(e) => setPpgRange({...ppgRange, max: parseFloat(e.target.value)})}
                            />
                        </div>

                        <div className="filter-group">
                            <label>Confidence Band (Single select)</label>
                            <div className="confidence-band">
                                <label>
                                    <input 
                                        type="radio" 
                                        name="confidence"
                                        value="low"
                                        checked={confidenceBand === 'low'}
                                        onChange={(e) => setConfidenceBand(e.target.value)}
                                    />
                                    Low
                                </label>
                                <label>
                                    <input 
                                        type="radio" 
                                        name="confidence"
                                        value="medium"
                                        checked={confidenceBand === 'medium'}
                                        onChange={(e) => setConfidenceBand(e.target.value)}
                                    />
                                    Medium
                                </label>
                                <label>
                                    <input 
                                        type="radio" 
                                        name="confidence"
                                        value="high"
                                        checked={confidenceBand === 'high'}
                                        onChange={(e) => setConfidenceBand(e.target.value)}
                                    />
                                    High
                                </label>
                            </div>
                        </div>
                    </div>

                    <div className="tabs">
                        {['OHL', 'OJHL', 'GOJHL', 'NOJHL'].map(league => (
                            <button 
                                key={league}
                                className={`tab-button ${activeTab === league ? 'active' : ''}`}
                                onClick={() => setActiveTab(league)}
                            >
                                {league}
                            </button>
                        ))}
                    </div>

                    <div className="results-info">
                        Showing {sortedData.length} of {data.length} players
                        {confidenceBand !== 'medium' && ` (${confidenceBand.toUpperCase()} confidence band)`}
                    </div>

                    <div className="table-wrapper">
                        {sortedData.length === 0 ? (
                            <div className="no-data">No players match your filters</div>
                        ) : (
                            <table>
                                <thead>
                                    <tr>
                                        <th className="sortable" onClick={() => handleSort('Player')}>
                                            Player
                                        </th>
                                        <th className="sortable" onClick={() => handleSort('Team_2025_26')}>
                                            Team
                                        </th>
                                        <th className="sortable" onClick={() => handleSort('League_2025_26')}>
                                            League
                                        </th>
                                        <th className="sortable" onClick={() => handleSort('Position_Class')}>
                                            Position
                                        </th>
                                        <th className="sortable" onClick={() => handleSort('Age_Group_2025_26')}>
                                            Age
                                        </th>
                                        <th className="sortable" onClick={() => handleSort('GP_2025_26')}>
                                            GP
                                        </th>
                                        <th className="sortable" onClick={() => handleSort('TP_2025_26')}>
                                            PTS
                                        </th>
                                        <th className="sortable" onClick={() => handleSort('PPG_2025_26')}>
                                            PPG
                                        </th>
                                        <th className="sortable" onClick={() => handleSort(`G_${activeTab}_2026_27`)}>
                                            {activeTab} GPG
                                        </th>
                                        <th className="sortable" onClick={() => handleSort(`G_${activeTab}_2026_27`)}>
                                            {activeTab} G
                                        </th>
                                        <th className="sortable" onClick={() => handleSort(`A_${activeTab}_2026_27`)}>
                                            {activeTab} APG
                                        </th>
                                        <th className="sortable" onClick={() => handleSort(`A_${activeTab}_2026_27`)}>
                                            {activeTab} A
                                        </th>
                                        <th className="sortable" onClick={() => handleSort(`PTS_${activeTab}_2026_27`)}>
                                            {activeTab} PPG
                                        </th>
                                        <th className="sortable" onClick={() => handleSort(`PTS_${activeTab}_2026_27`)}>
                                            {activeTab} PTS
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedData.map((row, idx) => (
                                        <tr key={idx}>
                                            <td className="player-name">{row.Player}</td>
                                            <td>{row.Team_2025_26}</td>
                                            <td>
                                                <span className={`league-badge ${getLeagueBadgeClass(row.League_2025_26)}`}>
                                                    {row.League_2025_26}
                                                </span>
                                            </td>
                                            <td>
                                                <span className="position-badge">{row.Position_Class}</span>
                                            </td>
                                            <td className="stats-info">{row.Age_Group_2025_26.toUpperCase()}</td>
                                            <td className="stats-info">{row.GP_2025_26}</td>
                                            <td className="stats-info">{row.TP_2025_26}</td>
                                            <td className="stats-info">{row.PPG_2025_26.toFixed(3)}</td>
                                            <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'GPG'))}`}>
                                                {getPredictionValue(row, 'GPG').toFixed(3)}
                                            </td>
                                            <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'GPG'))}`}>
                                                <strong>{getPredictionValue(row, 'G').toFixed(1)}</strong>
                                            </td>
                                            <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'APG'))}`}>
                                                {getPredictionValue(row, 'APG').toFixed(3)}
                                            </td>
                                            <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'APG'))}`}>
                                                <strong>{getPredictionValue(row, 'A').toFixed(1)}</strong>
                                            </td>
                                            <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'PPG'))}`}>
                                                {getPredictionValue(row, 'PPG').toFixed(3)}
                                            </td>
                                            <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'PPG'))}`}>
                                                <strong>{getPredictionValue(row, 'PTS').toFixed(1)}</strong>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    </script>
</body>
</html>
