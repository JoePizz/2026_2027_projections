<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Predictions 2026-27</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172b;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-start;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 0.9em;
            color: #333;
            line-height: 1;
        }

        .filter-group input,
        .filter-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            min-width: 150px;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .multi-select {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            min-width: 150px;
            background: white;
        }

        .multi-select label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
            font-size: 0.9em;
            gap: 8px;
            margin: 0;
            line-height: 1;
        }

        .multi-select input[type="checkbox"] {
            margin: 0;
            cursor: pointer;
            flex-shrink: 0;
        }

        .confidence-band {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .confidence-band label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            cursor: pointer;
            margin: 0;
            line-height: 1;
            font-size: 0.9em;
        }

        .confidence-band input[type="radio"] {
            margin: 0;
            cursor: pointer;
            flex-shrink: 0;
        }

        .toggle-buttons {
            display: flex;
            gap: 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
        }

        .toggle-btn {
            flex: 1;
            padding: 8px 16px;
            border: none;
            background: #e8e8e8;
            color: #333;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: #3498db;
            color: white;
        }

        .toggle-btn:hover {
            background: #d0d0d0;
        }

        .toggle-btn.active:hover {
            background: #2980b9;
        }

        .league-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            color: white;
        }

        .league-ohl { background-color: #2c3e50; }
        .league-ojhl { background-color: #e74c3c; }
        .league-gojhl { background-color: #f39c12; }
        .league-nojhl { background-color: #16a085; }
        .league-u16 { background-color: #8e44ad; }
        .league-other { background-color: #95a5a6; }

        .position-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            background: #ecf0f1;
            color: #2c3e50;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th {
            background: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        th.sortable:hover {
            background: #2c3e50;
        }

        th::after {
            content: ' ⇅';
            opacity: 0;
            font-size: 0.8em;
        }

        th.sorted-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sorted-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr:hover {
            background: #f8f9fa;
            cursor: pointer;
        }

        .player-name {
            font-weight: 600;
            color: #2c3e50;
            min-width: 150px;
        }

        .stats-info {
            text-align: center;
            color: #555;
        }

        .prediction-cell {
            text-align: center;
            font-weight: 500;
        }

        .prediction-high {
            color: #27ae60;
        }

        .prediction-mid {
            color: #f39c12;
        }

        .prediction-low {
            color: #e74c3c;
        }

        .results-info {
            padding: 15px 20px;
            background: #e8f4f8;
            border-top: 1px solid #bdc3c7;
            color: #2c3e50;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #bdc3c7;
            background: #f8f9fa;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            color: #7f8c8d;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .tab-button.active {
            color: #3498db;
            border-bottom: 3px solid #3498db;
            margin-bottom: -2px;
        }

        .tab-button:hover {
            color: #34495e;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 1.1em;
        }

        /* Modal styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: flex-end;
            z-index: 1000;
        }

        .modal-drawer {
            background: white;
            width: 90%;
            max-width: 1200px;
            height: 100vh;
            overflow-y: auto;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            font-size: 1.8em;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .modal-content {
            padding: 20px;
        }

        .section-title {
            font-size: 1.5em;
            font-weight: 600;
            color: #2c3e50;
            margin: 30px 0 15px 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .prediction-controls {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .prediction-controls .filter-group {
            flex: 0 1 auto;
        }

        .prediction-controls label {
            font-size: 0.85em !important;
            font-weight: 600 !important;
        }

        .prediction-controls .filter-group input,
        .prediction-controls .filter-group select {
            font-size: 0.85em !important;
            padding: 6px 10px !important;
        }

        .prediction-controls .confidence-band {
            gap: 12px !important;
        }

        .prediction-controls .confidence-band label {
            font-size: 0.85em !important;
            gap: 4px !important;
        }

        .prediction-controls .toggle-buttons {
            gap: 0 !important;
        }

        .prediction-controls .toggle-btn {
            padding: 6px 12px !important;
            font-size: 0.85em !important;
        }

        .modal-drawer table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
            table-layout: fixed;
        }

        .modal-drawer table thead {
            background: #34495e;
            color: white;
        }

        .modal-drawer table th {
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #bdc3c7;
        }

        .modal-drawer table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Junior Hockey Predictions 2026-2027</h1>
            <p>Ontario Junior Hockey Player Performance Forecasts</p>
        </div>

        <div id="app"></div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            // Filters
            const [searchPlayer, setSearchPlayer] = useState('');
            const [selectedLeagues, setSelectedLeagues] = useState(new Set(['OHL']));
            const [selectedPositions, setSelectedPositions] = useState(new Set());
            const [selectedAgeGroups, setSelectedAgeGroups] = useState(new Set());
            const [confidenceBand, setConfidenceBand] = useState('medium');
            const [displayMode, setDisplayMode] = useState('total');
            
            // Sorting
            const [sortKey, setSortKey] = useState('PTS');
            const [sortOrder, setSortOrder] = useState('desc');
            
            // League tab
            const [activeTab, setActiveTab] = useState('OHL');

            // Modal
            const [selectedPlayer, setSelectedPlayer] = useState(null);
            const [playerHistoryData, setPlayerHistoryData] = useState({});

            const expectedGP = {
                'OHL': 68,
                'OJHL': 56,
                'GOJHL': 50,
                'NOJHL': 50,
            };

            // Load data
            useEffect(() => {
                const timestamp = new Date().getTime();
                fetch(`predictions_data.json?t=${timestamp}`)
                    .then(res => res.json())
                    .then(json => {
                        setData(json);
                        setLoading(false);
                    })
                    .catch(err => {
                        setError(`Failed to load data: ${err.message}`);
                        setLoading(false);
                    });
            }, []);

            // Filter data
            const filteredData = data.filter(row => {
                if (searchPlayer && !row.Player.toLowerCase().includes(searchPlayer.toLowerCase())) {
                    return false;
                }

                if (selectedLeagues.size > 0 && !selectedLeagues.has(row.League_2025_26)) {
                    return false;
                }

                if (selectedPositions.size > 0 && !selectedPositions.has(row.Position_Class)) {
                    return false;
                }

                if (selectedAgeGroups.size > 0 && !selectedAgeGroups.has(row.Age_Group_2025_26)) {
                    return false;
                }

                return true;
            });

            // Sort data
            const sortedData = [...filteredData].sort((a, b) => {
                let aVal, bVal;
                
                if (['PTS', 'G', 'A', 'PPG', 'GPG', 'APG'].includes(sortKey)) {
                    const predictions_a = a[`${activeTab}_predictions`];
                    const predictions_b = b[`${activeTab}_predictions`];
                    
                    if (!predictions_a || !predictions_b) return 0;
                    
                    aVal = predictions_a[confidenceBand][sortKey] ?? 0;
                    bVal = predictions_b[confidenceBand][sortKey] ?? 0;
                } else {
                    aVal = a[sortKey] ?? 0;
                    bVal = b[sortKey] ?? 0;
                }
                
                if (typeof aVal === 'string') {
                    return sortOrder === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                }
                
                return sortOrder === 'asc' ? aVal - bVal : bVal - aVal;
            });

            const getPredictionValue = (player, metric) => {
                const predictions = player[`${activeTab}_predictions`];
                if (!predictions) return 0;
                return predictions[confidenceBand][metric] ?? 0;
            };

            const handleLeagueChange = (league) => {
                const newSet = new Set(selectedLeagues);
                if (newSet.has(league)) {
                    newSet.delete(league);
                } else {
                    newSet.add(league);
                }
                setSelectedLeagues(newSet);
            };

            const handlePositionChange = (pos) => {
                const newSet = new Set(selectedPositions);
                if (newSet.has(pos)) {
                    newSet.delete(pos);
                } else {
                    newSet.add(pos);
                }
                setSelectedPositions(newSet);
            };

            const handleAgeChange = (age) => {
                const newSet = new Set(selectedAgeGroups);
                if (newSet.has(age)) {
                    newSet.delete(age);
                } else {
                    newSet.add(age);
                }
                setSelectedAgeGroups(newSet);
            };

            const handleSort = (key) => {
                if (sortKey === key) {
                    setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc');
                } else {
                    setSortKey(key);
                    setSortOrder('desc');
                }
            };

            const openPlayerDetail = (player) => {
                setSelectedPlayer(player);
                // In a real app, you'd fetch player history here
                // For now, we just use the data we have
            };

            const closePlayerDetail = () => {
                setSelectedPlayer(null);
            };

            const getLeagueBadgeClass = (league) => {
                if (league.includes('OHL') && !league.includes('OJHL') && !league.includes('GOJHL') && !league.includes('NOJHL')) return 'league-ohl';
                if (league.includes('OJHL')) return 'league-ojhl';
                if (league.includes('GOJHL')) return 'league-gojhl';
                if (league.includes('NOJHL')) return 'league-nojhl';
                if (league.includes('U16') || league.includes('u16')) return 'league-u16';
                return 'league-other';
            };

            const getPredictionClass = (value) => {
                if (value >= 1.0) return 'prediction-high';
                if (value >= 0.5) return 'prediction-mid';
                return 'prediction-low';
            };

            const getPositionFullName = (pos) => {
                const names = {
                    'C': 'Centre',
                    'W': 'Winger',
                    'D': 'Defenceman',
                    'F_Other': 'Forward',
                };
                return names[pos] || pos;
            };

            const getSortClass = (key) => {
                if (sortKey !== key) return '';
                return sortOrder === 'asc' ? 'sorted-asc' : 'sorted-desc';
            };

            if (loading) return <div className="no-data">Loading predictions...</div>;
            if (error) return <div className="no-data" style={{color: '#e74c3c'}}>{error}</div>;

            return (
                <>
                    <div className="controls">
                        <div className="filter-group">
                            <label>Player Name</label>
                            <input 
                                type="text" 
                                placeholder="Search player..." 
                                value={searchPlayer}
                                onChange={(e) => setSearchPlayer(e.target.value)}
                            />
                        </div>

                        <div className="filter-group">
                            <label>League (Multi-select)</label>
                            <div className="multi-select">
                                {['OHL', 'OJHL', 'GOJHL', 'NOJHL', 'GTHL-U16', 'OMHA-U16', 'HEO-U16', 'ALLIANCE-U16'].map(league => (
                                    <label key={league}>
                                        <input 
                                            type="checkbox" 
                                            checked={selectedLeagues.has(league)}
                                            onChange={() => handleLeagueChange(league)}
                                        />
                                        {league}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="filter-group">
                            <label>Position (Multi-select)</label>
                            <div className="multi-select">
                                {['C', 'W', 'D', 'F_Other'].map(pos => (
                                    <label key={pos}>
                                        <input 
                                            type="checkbox" 
                                            checked={selectedPositions.has(pos)}
                                            onChange={() => handlePositionChange(pos)}
                                        />
                                        {getPositionFullName(pos)}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="filter-group">
                            <label>Age Group (Multi-select)</label>
                            <div className="multi-select">
                                {['u16', 'u17', 'u18', 'u19', 'u20'].map(age => (
                                    <label key={age}>
                                        <input 
                                            type="checkbox" 
                                            checked={selectedAgeGroups.has(age)}
                                            onChange={() => handleAgeChange(age)}
                                        />
                                        {age.toUpperCase()}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="filter-group">
                            <label>Confidence Band</label>
                            <div className="confidence-band">
                                <label>
                                    <input 
                                        type="radio" 
                                        name="confidence"
                                        value="low"
                                        checked={confidenceBand === 'low'}
                                        onChange={(e) => setConfidenceBand(e.target.value)}
                                    />
                                    Low
                                </label>
                                <label>
                                    <input 
                                        type="radio" 
                                        name="confidence"
                                        value="medium"
                                        checked={confidenceBand === 'medium'}
                                        onChange={(e) => setConfidenceBand(e.target.value)}
                                    />
                                    Medium
                                </label>
                                <label>
                                    <input 
                                        type="radio" 
                                        name="confidence"
                                        value="high"
                                        checked={confidenceBand === 'high'}
                                        onChange={(e) => setConfidenceBand(e.target.value)}
                                    />
                                    High
                                </label>
                            </div>
                        </div>
                    </div>

                    <div className="tabs">
                        {['OHL', 'OJHL', 'GOJHL', 'NOJHL'].map(league => (
                            <button 
                                key={league}
                                className={`tab-button ${activeTab === league ? 'active' : ''}`}
                                onClick={() => setActiveTab(league)}
                            >
                                {league} ({expectedGP[league]} GP)
                            </button>
                        ))}
                    </div>

                    <div className="results-info">
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <div>
                                Showing {sortedData.length} of {data.length} players
                                {confidenceBand !== 'medium' && ` (${confidenceBand.toUpperCase()} confidence band)`}
                            </div>
                            <div className="toggle-buttons">
                                <button 
                                    className={`toggle-btn ${displayMode === 'total' ? 'active' : ''}`}
                                    onClick={() => setDisplayMode('total')}
                                >
                                    Total
                                </button>
                                <button 
                                    className={`toggle-btn ${displayMode === 'perGame' ? 'active' : ''}`}
                                    onClick={() => setDisplayMode('perGame')}
                                >
                                    Per Game
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="table-wrapper">
                        {sortedData.length === 0 ? (
                            <div className="no-data">No players match your filters</div>
                        ) : (
                            <table>
                                <thead>
                                    <tr>
                                        <th className={`sortable ${getSortClass('Player')}`} onClick={() => handleSort('Player')}>
                                            Player
                                        </th>
                                        <th className={`sortable ${getSortClass('Team_2025_26')}`} onClick={() => handleSort('Team_2025_26')}>
                                            Team
                                        </th>
                                        <th className={`sortable ${getSortClass('League_2025_26')}`} onClick={() => handleSort('League_2025_26')}>
                                            League
                                        </th>
                                        <th className={`sortable ${getSortClass('Position_Class')}`} onClick={() => handleSort('Position_Class')}>
                                            Position
                                        </th>
                                        <th className={`sortable ${getSortClass('Age_Group_2025_26')}`} onClick={() => handleSort('Age_Group_2025_26')}>
                                            Age
                                        </th>
                                        <th className={`sortable ${getSortClass('GP_2025_26')}`} onClick={() => handleSort('GP_2025_26')}>
                                            25-26 GP
                                        </th>
                                        <th className={`sortable ${getSortClass('G_2025_26')}`} onClick={() => handleSort('G_2025_26')}>
                                            25-26 G
                                        </th>
                                        <th className={`sortable ${getSortClass('A_2025_26')}`} onClick={() => handleSort('A_2025_26')}>
                                            25-26 A
                                        </th>
                                        <th className={`sortable ${getSortClass('TP_2025_26')}`} onClick={() => handleSort('TP_2025_26')}>
                                            25-26 PTS
                                        </th>
                                        <th className={`sortable ${getSortClass('PPG_2025_26')}`} onClick={() => handleSort('PPG_2025_26')}>
                                            25-26 PPG
                                        </th>
                                        <th className={`sortable`} onClick={() => {}}>
                                            26-27 GP
                                        </th>
                                        {displayMode === 'total' ? (
                                            <>
                                                <th className={`sortable ${getSortClass('G')}`} onClick={() => handleSort('G')}>
                                                    26-27 G
                                                </th>
                                                <th className={`sortable ${getSortClass('A')}`} onClick={() => handleSort('A')}>
                                                    26-27 A
                                                </th>
                                                <th className={`sortable ${getSortClass('PTS')}`} onClick={() => handleSort('PTS')}>
                                                    26-27 PTS
                                                </th>
                                            </>
                                        ) : (
                                            <>
                                                <th className={`sortable ${getSortClass('GPG')}`} onClick={() => handleSort('GPG')}>
                                                    26-27 GPG
                                                </th>
                                                <th className={`sortable ${getSortClass('APG')}`} onClick={() => handleSort('APG')}>
                                                    26-27 APG
                                                </th>
                                                <th className={`sortable ${getSortClass('PPG')}`} onClick={() => handleSort('PPG')}>
                                                    26-27 PPG
                                                </th>
                                            </>
                                        )}
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedData.map((row, idx) => (
                                        <tr key={idx} onClick={() => openPlayerDetail(row)}>
                                            <td className="player-name">{row.Player}</td>
                                            <td>{row.Team_2025_26}</td>
                                            <td>
                                                <span className={`league-badge ${getLeagueBadgeClass(row.League_2025_26)}`}>
                                                    {row.League_2025_26}
                                                </span>
                                            </td>
                                            <td>
                                                <span className="position-badge">{getPositionFullName(row.Position_Class)}</span>
                                            </td>
                                            <td className="stats-info">{row.Age_Group_2025_26.toUpperCase()}</td>
                                            <td className="stats-info">{row.GP_2025_26}</td>
                                            <td className="stats-info">{row.G_2025_26}</td>
                                            <td className="stats-info">{row.A_2025_26}</td>
                                            <td className="stats-info">{row.TP_2025_26}</td>
                                            <td className="stats-info">{row.PPG_2025_26.toFixed(3)}</td>
                                            <td className="stats-info">{expectedGP[activeTab]}</td>
                                            {displayMode === 'total' ? (
                                                <>
                                                    <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'GPG'))}`}>
                                                        <strong>{getPredictionValue(row, 'G').toFixed(1)}</strong>
                                                    </td>
                                                    <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'APG'))}`}>
                                                        <strong>{getPredictionValue(row, 'A').toFixed(1)}</strong>
                                                    </td>
                                                    <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'PPG'))}`}>
                                                        <strong>{getPredictionValue(row, 'PTS').toFixed(1)}</strong>
                                                    </td>
                                                </>
                                            ) : (
                                                <>
                                                    <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'GPG'))}`}>
                                                        {getPredictionValue(row, 'GPG').toFixed(3)}
                                                    </td>
                                                    <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'APG'))}`}>
                                                        {getPredictionValue(row, 'APG').toFixed(3)}
                                                    </td>
                                                    <td className={`prediction-cell ${getPredictionClass(getPredictionValue(row, 'PPG'))}`}>
                                                        {getPredictionValue(row, 'PPG').toFixed(3)}
                                                    </td>
                                                </>
                                            )}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>

                    {selectedPlayer && (
                        <PlayerDetailModal 
                            player={selectedPlayer}
                            allPlayers={data}
                            expectedGP={expectedGP}
                            getPositionFullName={getPositionFullName}
                            getLeagueBadgeClass={getLeagueBadgeClass}
                            onClose={closePlayerDetail}
                        />
                    )}
                </>
            );
        }

        function PlayerDetailModal({ player, allPlayers, expectedGP, getPositionFullName, getLeagueBadgeClass, onClose }) {
            const [activeTab, setActiveTab] = React.useState('OHL');
            const [confidenceBand, setConfidenceBand] = React.useState('medium');
            const [displayMode, setDisplayMode] = React.useState('total');

            const getPredictionValue = (pred_player, metric) => {
                const predictions = pred_player[`${activeTab}_predictions`];
                if (!predictions) return 0;
                return predictions[confidenceBand][metric] ?? 0;
            };

            const getPredictionClass = (value) => {
                if (value >= 1.0) return 'prediction-high';
                if (value >= 0.5) return 'prediction-mid';
                return 'prediction-low';
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-drawer" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2>{player.Player}</h2>
                            <button className="close-btn" onClick={onClose}>×</button>
                        </div>

                        <div className="modal-content">
                            {/* Historical Stats */}
                            <div className="section-title">Player History</div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Season</th>
                                        <th>League</th>
                                        <th>Team</th>
                                        <th>GP</th>
                                        <th>G</th>
                                        <th>A</th>
                                        <th>PTS</th>
                                        <th>PPG</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {player.History && player.History.map((hist, idx) => (
                                        <tr key={idx}>
                                            <td><strong>{hist.Season}</strong></td>
                                            <td><span className={`league-badge ${getLeagueBadgeClass(hist.League)}`}>{hist.League}</span></td>
                                            <td>{hist.Team}</td>
                                            <td>{hist.GP}</td>
                                            <td>{hist.G}</td>
                                            <td>{hist.A}</td>
                                            <td>{hist.PTS}</td>
                                            <td>{hist.PPG.toFixed(3)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>

                            {/* Comparable Historical Seasons */}
                            {player.ComparableSeasons && player.ComparableSeasons.length > 0 && (
                                <>
                                    <div className="section-title">Similar Historical Seasons</div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Player</th>
                                                <th>Season</th>
                                                <th>League</th>
                                                <th>Team</th>
                                                <th>GP</th>
                                                <th>G</th>
                                                <th>A</th>
                                                <th>PTS</th>
                                                <th>PPG</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {player.ComparableSeasons.slice(0, 8).map((comp, idx) => (
                                                <tr key={idx}>
                                                    <td style={{textAlign: 'left', fontWeight: '500'}}>{comp.Player}</td>
                                                    <td>{comp.Season}</td>
                                                    <td><span className={`league-badge ${getLeagueBadgeClass(comp.League)}`}>{comp.League}</span></td>
                                                    <td style={{fontSize: '0.9em'}}>{comp.Team}</td>
                                                    <td>{comp.GP}</td>
                                                    <td>{comp.G}</td>
                                                    <td>{comp.A}</td>
                                                    <td>{comp.PTS}</td>
                                                    <td>{comp.PPG.toFixed(3)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </>
                            )}

                            {/* Predictions */}
                            <div className="section-title">2026-27 Projections</div>
                            
                            <div className="prediction-controls">
                                <div className="filter-group">
                                    <label>League</label>
                                    <div style={{display: 'flex', gap: '5px'}}>
                                        {['OHL', 'OJHL', 'GOJHL', 'NOJHL'].map(league => (
                                            <button 
                                                key={league}
                                                className={`toggle-btn ${activeTab === league ? 'active' : ''}`}
                                                onClick={() => setActiveTab(league)}
                                                style={{padding: '6px 12px', fontSize: '0.85em'}}
                                            >
                                                {league}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="filter-group">
                                    <label>Confidence Band</label>
                                    <div className="confidence-band">
                                        <label>
                                            <input 
                                                type="radio" 
                                                name="confidence"
                                                value="low"
                                                checked={confidenceBand === 'low'}
                                                onChange={(e) => setConfidenceBand(e.target.value)}
                                            />
                                            Low
                                        </label>
                                        <label>
                                            <input 
                                                type="radio" 
                                                name="confidence"
                                                value="medium"
                                                checked={confidenceBand === 'medium'}
                                                onChange={(e) => setConfidenceBand(e.target.value)}
                                            />
                                            Medium
                                        </label>
                                        <label>
                                            <input 
                                                type="radio" 
                                                name="confidence"
                                                value="high"
                                                checked={confidenceBand === 'high'}
                                                onChange={(e) => setConfidenceBand(e.target.value)}
                                            />
                                            High
                                        </label>
                                    </div>
                                </div>

                                <div className="filter-group">
                                    <label>&nbsp;</label>
                                    <div className="toggle-buttons">
                                        <button 
                                            className={`toggle-btn ${displayMode === 'total' ? 'active' : ''}`}
                                            onClick={() => setDisplayMode('total')}
                                        >
                                            Total
                                        </button>
                                        <button 
                                            className={`toggle-btn ${displayMode === 'perGame' ? 'active' : ''}`}
                                            onClick={() => setDisplayMode('perGame')}
                                        >
                                            Per Game
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <table>
                                <thead>
                                    <tr>
                                        <th>League</th>
                                        <th>Expected GP</th>
                                        {displayMode === 'total' ? (
                                            <>
                                                <th>G</th>
                                                <th>A</th>
                                                <th>PTS</th>
                                                <th>PPG</th>
                                            </>
                                        ) : (
                                            <>
                                                <th>GPG</th>
                                                <th>APG</th>
                                                <th>PPG</th>
                                            </>
                                        )}
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>{activeTab}</td>
                                        <td>{expectedGP[activeTab]}</td>
                                        {displayMode === 'total' ? (
                                            <>
                                                <td className={`prediction-cell ${getPredictionClass(getPredictionValue(player, 'G'))}`}>
                                                    <strong>{getPredictionValue(player, 'G').toFixed(1)}</strong>
                                                </td>
                                                <td className={`prediction-cell ${getPredictionClass(getPredictionValue(player, 'A'))}`}>
                                                    <strong>{getPredictionValue(player, 'A').toFixed(1)}</strong>
                                                </td>
                                                <td className={`prediction-cell ${getPredictionClass(getPredictionValue(player, 'PTS'))}`}>
                                                    <strong>{getPredictionValue(player, 'PTS').toFixed(1)}</strong>
                                                </td>
                                                <td className={`prediction-cell ${getPredictionClass(getPredictionValue(player, 'PPG'))}`}>
                                                    {getPredictionValue(player, 'PPG').toFixed(3)}
                                                </td>
                                            </>
                                        ) : (
                                            <>
                                                <td className={`prediction-cell ${getPredictionClass(getPredictionValue(player, 'GPG'))}`}>
                                                    {getPredictionValue(player, 'GPG').toFixed(3)}
                                                </td>
                                                <td className={`prediction-cell ${getPredictionClass(getPredictionValue(player, 'APG'))}`}>
                                                    {getPredictionValue(player, 'APG').toFixed(3)}
                                                </td>
                                                <td className={`prediction-cell ${getPredictionClass(getPredictionValue(player, 'PPG'))}`}>
                                                    {getPredictionValue(player, 'PPG').toFixed(3)}
                                                </td>
                                            </>
                                        )}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    </script>
</body>
</html>
